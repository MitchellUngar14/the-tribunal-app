<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratabase Web UI Sandbox</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="container mt-5">
    <header class="mb-4">
        <h1>Ratabase Web UI Sandbox</h1>
        <!-- Toggle switch for Dark/Light mode with text beside it -->
        <div class="d-flex align-items-center">
            <label class="form-check-label mode-label" for="modeToggle" id="modeLabel">Dark Mode</label>
            <div class="form-check form-switch">
                <input class="form-check-input toggle-large" type="checkbox" id="modeToggle" checked>
            </div>
        </div>
    </header>

    <div class="row">
        <div class="col-md-6">
            <div class="button-group">
                <a href="https://pl-ratabase-webui-amr-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">AMR</a>
                <a href="https://pl-ratabase-webui-autogrs-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Auto GRS</a>
                <a href="https://pl-ratabase-webui-auto-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Auto</a>
                <a href="https://pl-ratabase-webui-autoomega1-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Auto Omega 1</a>
                <a href="https://pl-ratabase-webui-automobile-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Automobile</a>
                <a href="https://pl-ratabase-webui-hmr-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">HMR</a>
                <a href="https://pl-ratabase-webui-homeele-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Home ELE</a>
                <a href="https://pl-ratabase-webui-homestd-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Home STD</a>
                <a href="https://pl-ratabase-webui-oasis-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Oasis</a>
                <a href="https://pl-ratabase-webui-renters-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Simple Renters</a>
                <a href="https://pl-ratabase-webui-umr-sandbox.lmig.com/login" target="_blank" class="btn btn-custom btn-lg mb-2">Umbrella (UMR)</a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="helpful-links-box p-3">
                <h2>Helpful Links</h2>
                <ul class="list-unstyled">
                    <li><a href="https://libertymutual.atlassian.net/wiki/x/IZllU" target="_blank">Ratabase Web UI User Guide</a></li>
                </ul>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS (optional for interactions) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JavaScript -->
<script src="js/main.js"></script>
</body>
</html>
